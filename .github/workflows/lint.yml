name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v3.0.0
        with:
          version: latest
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.11.1
          cache: pnpm
      - run: pnpm i
      - run: pnpm lint
      - run: pnpm typecheck
